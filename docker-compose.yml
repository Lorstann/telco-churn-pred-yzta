version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: telco-churn-api:latest
    container_name: telco_churn_api
    environment:
      APP_MODE: api
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    image: telco-churn-api:latest
    container_name: telco_churn_streamlit
    environment:
      APP_MODE: streamlit
      STREAMLIT_PORT: 8501
      STREAMLIT_API_BASE: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
